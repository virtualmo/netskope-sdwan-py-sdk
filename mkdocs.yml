site_name: netskope-sdwan-py-sdk
site_description: Read-only Python SDK for Netskope SD-WAN APIs
repo_url: https://github.com/ns-melamin/netskope-sdwan-py-sdk
repo_name: ns-melamin/netskope-sdwan-py-sdk
theme:
  name: material
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Authentication: authentication.md
  - Examples: examples.md
  - API Reference:
      - Overview: api/index.md
      - Package: api/package.md
      - Client: api/client.md
      - Config: api/config.md
      - Enums: api/enums.md
      - Exceptions: api/exceptions.md
      - Pagination: api/pagination.md
      - Tenant Resolution: api/tenant-resolution.md
      - Transport: api/transport.md
      - Legacy v1: api/v1.md
      - Managers: api/managers.md
      - Gateway Manager Module: api/managers-gateways.md
      - Resource Manager Module: api/managers-resources.md
      - Models: api/models.md
      - Gateway Model: api/models-gateway.md
      - Resource Model: api/models-resource.md
      - Download Model: api/models-download.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
